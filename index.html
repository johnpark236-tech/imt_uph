<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMT UPH 계산기</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        .calculator { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #0078D7, #005A9E);
            color: white; 
            padding: 20px 15px;
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .result-title { 
            font-size: 14px; 
            margin-bottom: 5px; 
            opacity: 0.9; 
            letter-spacing: 1px;
        }
        
        .result-value { 
            font-size: 42px; 
            font-weight: bold; 
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s; 
        }

        .result-value.pop {
            transform: scale(1.2); 
            color: #FFD700; 
        }

        h2 { 
            text-align: center; 
            color: #333; 
            margin: 25px 0 15px 0; 
            font-size: 20px;
        }

        .inputs-container {
            padding: 0 20px 30px 20px;
        }

        .input-group { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            padding: 10px 15px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            border: 1px solid #eaeaea;
        }
        
        label { font-weight: bold; color: #555; font-size: 14px; }

        /* 💡 커스텀 숫자 입력창 래퍼 설정 */
        .custom-number-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
            overflow: hidden;
            width: 105px;
            height: 38px;
        }

        .custom-number-wrapper:focus-within {
            border-color: #0078D7;
            box-shadow: 0 0 5px rgba(0, 120, 215, 0.3);
        }

        input { 
            width: 100%;
            height: 100%;
            padding: 0 5px 0 10px; 
            border: none; 
            text-align: right; 
            font-size: 16px; 
            font-weight: bold; 
            color: #0078D7; 
            outline: none;
            box-sizing: border-box;
        }

        /* 💡 기본 스피너(화살표) 완벽히 숨기기 (PC/Mobile 공통) */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* 💡 커스텀 화살표 버튼 디자인 */
        .spinner-btns {
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ccc;
            height: 100%;
            width: 32px;
            background-color: #f1f1f1;
        }

        .spin-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: #555;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 파란 박스 제거 */
        }

        .spin-btn:active {
            background-color: #dcdcdc; /* 터치 시 눌리는 시각 효과 */
        }

        .spin-up {
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <div class="sticky-header">
        <div class="result-title">예상 UPH</div>
        <div class="result-value" id="uph_result">128.7</div>
    </div>

    <h2>IMT UPH check</h2>

    <div class="inputs-container">
        <div class="input-group">
            <label>Lot 수량 (개)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="lot" value="56" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('lot', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('lot', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>초기 로딩 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="init" value="132" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('init', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('init', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>핸들러 시간 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="handler" value="26" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('handler', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('handler', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>검사 시간 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="tester" value="15" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('tester', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('tester', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>최종 배출 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="final" value="5" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('final', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('final', -1)">▼</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // 💡 화살표 버튼을 눌렀을 때 숫자를 증감시키는 함수
    function stepValue(inputId, step) {
        const inputEl = document.getElementById(inputId);
        let currentVal = parseFloat(inputEl.value) || 0;
        
        // 0 이하로 내려가는 것을 방지 (마이너스 시간/수량 방지)
        let newVal = currentVal + step;
        if(newVal < 0) newVal = 0;
        
        inputEl.value = newVal;
        calculate(); // 값이 바뀌었으니 즉시 UPH 재계산
    }

    function calculate() {
        const lot = parseFloat(document.getElementById('lot').value) || 0;
        const init = parseFloat(document.getElementById('init').value) || 0;
        const handler = parseFloat(document.getElementById('handler').value) || 0;
        const tester = parseFloat(document.getElementById('tester').value) || 0;
        const finalTime = parseFloat(document.getElementById('final').value) || 0;
        
        const resultEl = document.getElementById('uph_result');
        let newUph = "0.0";

        if(lot > 1) {
            const bottleneck = Math.max(handler, tester);
            const totalSec = init + (bottleneck * (lot - 1)) + finalTime;
            
            if(totalSec > 0) {
                newUph = ((3600 / totalSec) * lot).toFixed(1);
            }
        }

        if(resultEl.innerText !== newUph) {
            resultEl.innerText = newUph;
            
            resultEl.classList.remove('pop');
            void resultEl.offsetWidth; 
            resultEl.classList.add('pop');
            
            setTimeout(() => {
                resultEl.classList.remove('pop');
            }, 200);
        }
    }
</script>

</body>
</html>
