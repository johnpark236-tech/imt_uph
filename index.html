<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMT UPH 계산기</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        .calculator { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #0078D7, #005A9E);
            color: white; 
            padding: 20px 15px;
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .result-title { 
            font-size: 14px; 
            margin-bottom: 5px; 
            opacity: 0.9; 
            letter-spacing: 1px;
        }
        
        .result-value { 
            font-size: 42px; 
            font-weight: bold; 
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s; 
        }

        .result-value.pop {
            transform: scale(1.2); 
            color: #FFD700; 
        }

        .formula-text {
            font-size: 13px;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.15);
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .bottleneck-text {
            font-size: 13px;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.5;
        }
        
        .bottleneck-highlight {
            color: #FFD700; 
            font-weight: bold;
        }

        .optimal-highlight {
            color: #A5D6A7; 
            font-weight: bold;
        }

        /* 💡 수정된 4초 룰 안내 문구 CSS */
        .retry-note {
            font-size: 11px;
            color: #dcedc8;
            display: block;
            margin-top: 8px;
            word-break: keep-all;
            background: rgba(0,0,0,0.1);
            padding: 6px;
            border-radius: 6px;
        }

        h2 { 
            text-align: center; 
            color: #333; 
            margin: 25px 0 15px 0; 
            font-size: 20px;
        }

        .inputs-container {
            padding: 0 20px 30px 20px;
        }

        .input-group { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            padding: 10px 15px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            border: 1px solid #eaeaea;
        }
        
        label { font-weight: bold; color: #555; font-size: 14px; }

        .custom-number-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
            overflow: hidden;
            width: 105px;
            height: 38px;
        }

        .custom-number-wrapper:focus-within {
            border-color: #0078D7;
            box-shadow: 0 0 5px rgba(0, 120, 215, 0.3);
        }

        input { 
            width: 100%;
            height: 100%;
            padding: 0 5px 0 10px; 
            border: none; 
            text-align: right; 
            font-size: 16px; 
            font-weight: bold; 
            color: #0078D7; 
            outline: none;
            box-sizing: border-box;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .spinner-btns {
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ccc;
            height: 100%;
            width: 32px;
            background-color: #f1f1f1;
        }

        .spin-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: #555;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        .spin-btn:active {
            background-color: #dcdcdc; 
        }

        .spin-up {
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <div class="sticky-header">
        <div class="result-title">예상 UPH</div>
        <div class="result-value" id="uph_result">128.7</div>
        <br>
        <div class="formula-text" id="formula_result">= 132 + (26 × 55) + 5 = 1567초</div>
        <div class="bottleneck-text" id="bottleneck_result">
            </div>
    </div>

    <h2>IMT UPH check</h2>

    <div class="inputs-container">
        <div class="input-group">
            <label>Lot 수량 (개)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="lot" value="56" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('lot', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('lot', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>초기 로딩 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="init" value="132" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('init', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('init', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>핸들러 시간 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="handler" value="26" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('handler', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('handler', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>검사 시간 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="tester" value="15" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('tester', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('tester', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>최종 배출 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="final" value="5" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('final', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('final', -1)">▼</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    function stepValue(inputId, step) {
        const inputEl = document.getElementById(inputId);
        let currentVal = parseFloat(inputEl.value) || 0;
        
        let newVal = currentVal + step;
        if(newVal < 0) newVal = 0;
        
        inputEl.value = newVal;
        calculate(); 
    }

    function calculate() {
        const lot = parseFloat(document.getElementById('lot').value) || 0;
        const init = parseFloat(document.getElementById('init').value) || 0;
        const handler = parseFloat(document.getElementById('handler').value) || 0;
        const tester = parseFloat(document.getElementById('tester').value) || 0;
        const finalTime = parseFloat(document.getElementById('final').value) || 0;
        
        const resultEl = document.getElementById('uph_result');
        const formulaEl = document.getElementById('formula_result'); 
        const bottleneckEl = document.getElementById('bottleneck_result'); 
        
        let newUph = "0.0";
        // 💡 수정된 안내 문구
        const retryNote = `<span class="retry-note">※ 핸들러는 4초 이상 여유 필요, retry가 발생 UPH에 영향 없을것으로 예상됨.</span>`;

        if(lot > 1) {
            const bottleneck = Math.max(handler, tester);
            const cycleCount = lot - 1;
            const totalSec = init + (bottleneck * cycleCount) + finalTime;
            
            if(totalSec > 0) {
                newUph = ((3600 / totalSec) * lot).toFixed(1);
                formulaEl.innerText = `= ${init} + (${bottleneck} × ${cycleCount}) + ${finalTime} = ${totalSec}초`;
                
                // 💡 4초 마진 룰에 따른 다이내믹 피드백
                if(handler > tester) {
                    const margin = parseFloat((handler - tester).toFixed(1));
                    bottleneckEl.innerHTML = `⚠️ <b>핸들러 병목</b> (${handler}초 &gt; ${tester}초)<br><span class="bottleneck-highlight">검사 시간은 ${margin}초 여유</span><br>${retryNote}`;
                } else if(tester > handler) {
                    const margin = parseFloat((tester - handler).toFixed(1));
                    if(margin >= 4) {
                        // 4초 이상 여유: 최적 상태 표기
                        bottleneckEl.innerHTML = `✅ <b>검사 병목 (최적)</b> (${tester}초 &gt; ${handler}초)<br><span class="optimal-highlight">핸들러 시간은 ${margin}초 여유 (핸들러 4초 여유 있을때가 최적임)</span><br>${retryNote}`;
                    } else {
                        // 4초 미만 여유
                        bottleneckEl.innerHTML = `⚠️ <b>검사 병목</b> (${tester}초 &gt; ${handler}초)<br><span class="bottleneck-highlight">핸들러 시간은 ${margin}초 여유 (4초 여유 부족)</span><br>${retryNote}`;
                    }
                } else {
                    bottleneckEl.innerHTML = `⚠️ <b>병목 없음 (균형)</b> (${handler}초 = ${tester}초)<br><span class="bottleneck-highlight">핸들러 여유 시간 없음 (4초 여유 부족)</span><br>${retryNote}`;
                }
            } else {
                formulaEl.innerText = "= 총 소요 시간 0초";
                bottleneckEl.innerHTML = "";
            }
        } else {
            formulaEl.innerText = "= 최소 2개 이상의 Lot 필요";
            bottleneckEl.innerHTML = "";
        }

        if(resultEl.innerText !== newUph) {
            resultEl.innerText = newUph;
            
            resultEl.classList.remove('pop');
            void resultEl.offsetWidth; 
            resultEl.classList.add('pop');
            
            setTimeout(() => {
                resultEl.classList.remove('pop');
            }, 200);
        }
    }
    
    window.onload = calculate;
</script>

</body>
</html>
