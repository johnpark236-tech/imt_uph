<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMT UPH Calculator</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        .calculator { 
            background: white; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #0078D7, #005A9E);
            color: white; 
            padding: 15px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .uph-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 5px;
        }

        .uph-box {
            text-align: center;
            width: 48%;
            background: rgba(255,255,255,0.1);
            padding: 8px 0;
            border-radius: 10px;
        }

        .uph-box.highlight {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .result-title { 
            font-size: 13px; 
            margin-bottom: 3px; 
            opacity: 0.95; 
            letter-spacing: 0.5px;
            font-weight: bold;
        }
        
        .result-value { 
            font-size: 30px; 
            font-weight: bold; 
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s; 
        }

        .result-value.pop {
            transform: scale(1.1); 
            color: #FFD700; 
        }

        .output-dashboard {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.2);
            padding: 10px 5px;
            border-radius: 8px;
            margin-top: 5px;
            font-size: 13px;
        }

        .output-item {
            text-align: center;
        }

        .output-item span {
            display: block;
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 3px;
        }

        .output-item strong {
            font-size: 14px;
            color: #A5D6A7;
        }

        .formula-text {
            font-size: 12px;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.15);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            word-break: keep-all;
        }

        .bottleneck-text {
            font-size: 12px;
            margin-top: 6px;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.3;
            text-align: center;
        }
        
        .bottleneck-highlight { color: #FFD700; font-weight: bold; }
        .optimal-highlight { color: #A5D6A7; font-weight: bold; }

        .retry-note {
            font-size: 11px;
            color: #dcedc8;
            display: block;
            margin-top: 4px;
            word-break: keep-all;
        }

        h2 { 
            text-align: center; 
            color: #333; 
            margin: 15px 0 10px 0; 
            font-size: 18px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #0078D7;
            margin: 10px 20px 5px 20px;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 5px;
        }

        .inputs-container {
            padding: 0 20px 10px 20px;
        }

        .input-group { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 8px; 
            padding: 8px 12px; 
            background: #f9f9f9; 
            border-radius: 8px; 
            border: 1px solid #eaeaea;
        }
        
        label { font-weight: bold; color: #555; font-size: 13px; }

        .custom-number-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
            overflow: hidden;
            width: 85px;
            height: 32px;
        }

        .custom-number-wrapper:focus-within {
            border-color: #0078D7;
            box-shadow: 0 0 5px rgba(0, 120, 215, 0.3);
        }

        input { 
            width: 100%;
            height: 100%;
            padding: 0 5px 0 5px; 
            border: none; 
            text-align: right; 
            font-size: 14px; 
            font-weight: bold; 
            color: #0078D7; 
            outline: none;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .spinner-btns {
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ccc;
            height: 100%;
            width: 26px;
            background-color: #f1f1f1;
        }

        .spin-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 9px;
            color: #555;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        .spin-btn:active { background-color: #dcdcdc; }
        .spin-up { border-bottom: 1px solid #ccc; }

        .inline-inputs {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        
        .inline-inputs .input-group {
            flex: 1;
            flex-direction: column;
            align-items: flex-start;
            padding: 10px;
            margin-bottom: 0;
        }

        .inline-inputs label {
            margin-bottom: 8px;
            font-size: 12px;
        }

        .inline-inputs .custom-number-wrapper {
            width: 100%;
        }

    </style>
</head>
<body>

<div class="calculator">
    
    <div class="sticky-header">
        <div class="uph-dashboard">
            <div class="uph-box">
                <div class="result-title">이론 UPH (100%)</div>
                <div class="result-value" id="uph_theo">0.0</div>
            </div>
            <div class="uph-box highlight">
                <div class="result-title" id="title_eff">실효율 UPH</div>
                <div class="result-value" style="color:#FFD700;" id="uph_eff">0.0</div>
            </div>
        </div>

        <div class="output-dashboard">
            <div class="output-item">
                <span>1일 (Day)</span>
                <strong id="out_day">0</strong>
            </div>
            <div class="output-item">
                <span>1주 (Week)</span>
                <strong id="out_week">0</strong>
            </div>
            <div class="output-item">
                <span>30일 (Month)</span>
                <strong id="out_month">0</strong>
            </div>
        </div>

        <div class="formula-text" id="formula_result"></div>
        <div class="bottleneck-text" id="bottleneck_result"></div>
    </div>
    <div class="section-title">⏱️ 상세 설비 타임 차트</div>
    <div class="inputs-container">
        <div class="input-group">
            <label>Lot 수량 (개)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="lot" value="56" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('lot', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('lot', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label id="label_init">핸들러 [소켓 in/ 6회] (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="init" value="132" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('init', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('init', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label id="label_handler">핸들러 [소켓 in/out 50회] (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="handler" value="26" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('handler', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('handler', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>검사 시간 (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="tester" value="21" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('tester', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('tester', -1)">▼</div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label id="label_unload5">핸들러 [소켓 out 5회] (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="unload5" value="17" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('unload5', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('unload5', -1)">▼</div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label id="label_unload1">핸들러 [소켓 out 1회] (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="unload1" value="7" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('unload1', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('unload1', -1)">▼</div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label id="label_final">최종 트레이 배출 [종료] (초)</label>
            <div class="custom-number-wrapper">
                <input type="number" inputmode="decimal" id="final" value="5" oninput="calculate()">
                <div class="spinner-btns">
                    <div class="spin-btn spin-up" onclick="stepValue('final', 1)">▲</div>
                    <div class="spin-btn spin-down" onclick="stepValue('final', -1)">▼</div>
                </div>
            </div>
        </div>
    </div>
    <div class="section-title">
    <div class="inputs-container" style="padding-bottom: 25px;">
        <div class="inline-inputs">
            <div class="input-group">
                <label>하루 가동 시간 (H)</label>
                <div class="custom-number-wrapper">
                    <input type="number" inputmode="decimal" id="runtime" value="22" oninput="calculate()">
                    <div class="spinner-btns">
                        <div class="spin-btn spin-up" onclick="stepValue('runtime', 1)">▲</div>
                        <div class="spin-btn spin-down" onclick="stepValue('runtime', -1)">▼</div>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label>설비 종합 효율 (%)</label>
                <div class="custom-number-wrapper">
                    <input type="number" inputmode="decimal" id="efficiency" value="85" oninput="calculate()">
                    <div class="spinner-btns">
                        <div class="spin-btn spin-up" onclick="stepValue('efficiency', 1)">▲</div>
                        <div class="spin-btn spin-down" onclick="stepValue('efficiency', -1)">▼</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    function stepValue(inputId, step) {
        const inputEl = document.getElementById(inputId);
        let currentVal = parseFloat(inputEl.value) || 0;
        
        let newVal = currentVal + step;
        if(newVal < 0) newVal = 0;
        
        if(inputId === 'efficiency' && newVal > 100) newVal = 100;
        if(inputId === 'runtime' && newVal > 24) newVal = 24;

        inputEl.value = newVal;
        calculate(); 
    }

    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function calculate() {
        const lot = parseFloat(document.getElementById('lot').value) || 0;
        const init = parseFloat(document.getElementById('init').value) || 0;
        const handler = parseFloat(document.getElementById('handler').value) || 0;
        const tester = parseFloat(document.getElementById('tester').value) || 0;
        const unload5 = parseFloat(document.getElementById('unload5').value) || 0;
        const unload1 = parseFloat(document.getElementById('unload1').value) || 0;
        const finalTime = parseFloat(document.getElementById('final').value) || 0;
        
        const runtimeH = parseFloat(document.getElementById('runtime').value) || 0;
        const effPercent = parseFloat(document.getElementById('efficiency').value) || 0;

        const theoEl = document.getElementById('uph_theo');
        const effEl = document.getElementById('uph_eff');
        const formulaEl = document.getElementById('formula_result'); 
        const bottleneckEl = document.getElementById('bottleneck_result'); 
        const titleEffEl = document.getElementById('title_eff'); 
        
        let theoUph = 0;
        let effUph = 0;
        
        const retryNote = `<span class="retry-note">※ 핸들러가 4초 이상 여유가 있을 경우, Retry가 발생하더라도 검사 시간에 묻히므로 최종 UPH에는 영향이 없습니다.</span>`;
        const cycleCount = lot >= 6 ? lot - 6 : 0;

        document.getElementById('label_init').innerText = `핸들러 [소켓 in/ 6회] `;
        document.getElementById('label_handler').innerText = `핸들러 [소켓 in/out ${cycleCount}회] `;
        document.getElementById('label_unload5').innerText = `핸들러 [소켓 out 5회] `;
        document.getElementById('label_unload1').innerText = `핸들러 [소켓 out 1회] `;
        document.getElementById('label_final').innerText = `최종 트레이 배출 [종료] `;

        // 💡 수정된 부분: 상단 "실효율 UPH" 텍스트에 가동시간과 효율을 동적으로 삽입
        titleEffEl.innerHTML = `실효율 UPH <span style="font-size:10px; font-weight:normal; letter-spacing:0;"><br>(${runtimeH}h, ${effPercent}%)</span>`;

        if(lot >= 6) {
            const bottleneck = Math.max(handler, tester);
            const totalSec = init + (bottleneck * cycleCount) + (unload5 * 5) + unload1 + finalTime;
            
            if(totalSec > 0) {
                // 1. 이론 UPH 계산 (1시간 기준)
                theoUph = (3600 / totalSec) * lot;
                
                // 2. 실효율 UPH 계산 (가동시간을 곱하지 않고, 순수하게 효율 %만 곱함)
                effUph = theoUph * (effPercent / 100);

                // 3. 생산량 계산 (실효율 UPH에 가동시간을 곱하여 산출)
                const dayOut = Math.floor(effUph * runtimeH);
                const weekOut = dayOut * 7;
                const monthOut = dayOut * 30; // 30일 기준

                document.getElementById('out_day').innerText = formatNumber(dayOut) + "개";
                document.getElementById('out_week').innerText = formatNumber(weekOut) + "개";
                document.getElementById('out_month').innerText = formatNumber(monthOut) + "개";

                formulaEl.innerHTML = `= ${init} + (${bottleneck} × ${cycleCount}) + (${unload5} × 5) + ${unload1} + ${finalTime} = <strong style="color:#FFD700; font-size:13px;">1 Lot 총 ${totalSec}초</strong>`;
                
                if(handler > tester) {
                    const margin = parseFloat((handler - tester).toFixed(1));
                    bottleneckEl.innerHTML = `⚠️ <b>핸들러 병목</b> (${handler}초 &gt; ${tester}초) / <span class="bottleneck-highlight">검사 ${margin}초 여유</span>`;
                } else if(tester > handler) {
                    const margin = parseFloat((tester - handler).toFixed(1));
                    if(margin >= 4) {
                        bottleneckEl.innerHTML = `✅ <b>검사 병목 (최적)</b> (${tester}초 &gt; ${handler}초)<br><span class="optimal-highlight">핸들러 4초 이상 여유 확보 (최적 상태)</span><br>${retryNote}`;
                    } else {
                        bottleneckEl.innerHTML = `⚠️ <b>검사 병목</b> (${tester}초 &gt; ${handler}초) / <span class="bottleneck-highlight">핸들러 여유 ${margin}초 (4초 부족)</span>`;
                    }
                } else {
                    bottleneckEl.innerHTML = `⚠️ <b>병목 없음 (균형)</b> (${handler}초 = ${tester}초) / <span class="bottleneck-highlight">여유 없음 (4초 부족)</span>`;
                }
            } else {
                formulaEl.innerText = "총 소요 시간 오류 (0초)";
                bottleneckEl.innerHTML = "";
            }
        } else {
            formulaEl.innerText = "최소 6개 이상의 Lot 필요";
            bottleneckEl.innerHTML = "";
            document.getElementById('out_day').innerText = "0개";
            document.getElementById('out_week').innerText = "0개";
            document.getElementById('out_month').innerText = "0개";
        }

        const theoStr = theoUph.toFixed(1);
        const effStr = effUph.toFixed(1);

        if(theoEl.innerText !== theoStr) {
            theoEl.innerText = theoStr;
            theoEl.classList.remove('pop');
            void theoEl.offsetWidth; 
            theoEl.classList.add('pop');
        }
        
        if(effEl.innerText !== effStr) {
            effEl.innerText = effStr;
            effEl.classList.remove('pop');
            void effEl.offsetWidth; 
            effEl.classList.add('pop');
        }
        
        setTimeout(() => {
            theoEl.classList.remove('pop');
            effEl.classList.remove('pop');
        }, 200);
    }
    
    window.onload = calculate;
</script>

</body>
</html>
